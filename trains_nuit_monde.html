    }

    #sidebar::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.12); border-radius:2px; }

    .subtitle { font-size:10px; color:#475569; margin-bottom:14px; line-height:1.6; }

    .op-section { margin-bottom:10px; }
    .op-header {
      display:flex; align-items:center; gap:8px;
      padding:5px 7px; border-radius:6px;
      cursor:pointer; user-select:none; transition:background .15s;
    }
    .op-header:hover { background:rgba(255,255,255,0.05); }
    .op-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .op-name { font-size:11.5px; font-weight:600; flex:1; }
    .op-toggle {
      font-size:9px; padding:2px 6px;
      border:1px solid rgba(255,255,255,0.1); border-radius:4px;
      background:none; color:#64748b; cursor:pointer; transition:all .15s;
    }
    .op-toggle:hover { color:#94a3b8; border-color:rgba(255,255,255,0.22); }

    .routes-list { padding:2px 8px 4px 26px; }
    .route-item {
      font-size:10px; color:#475569;
      padding:3px 5px; cursor:pointer; border-radius:4px;
      display:flex; justify-content:space-between; align-items:center;
      transition:all .15s;
    }
    .route-item:hover { color:#e2e8f0; background:rgba(255,255,255,0.06); }
    .route-km { font-size:9px; color:#334155; flex-shrink:0; margin-left:4px; }

    .divider { height:1px; background:rgba(255,255,255,0.06); margin:12px 0; }
    .note { font-size:10px; color:#334155; line-height:1.6; padding:8px;
      background:rgba(255,255,255,0.02); border-radius:6px;
      border:1px solid rgba(255,255,255,0.04); }

    }

    #searchBox:focus { border-color:rgba(255,255,255,0.22); }

// ── Haversine ─────────────────────────────────────────────────
function haversine([la1,lo1],[la2,lo2]){
  const R=6371,dl=(la2-la1)*Math.PI/180,dL=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dl/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dL/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}
function routeDist(stops){
  const pts=stops.map(s=>C[s]).filter(Boolean);
  let d=0; for(let i=0;i<pts.length-1;i++) d+=haversine(pts[i],pts[i+1]);
  return Math.round(d);
}

// ── Build map ──────────────────────────────────────────────────
const legendEl = document.getElementById('legend');
const allItems = []; // for search

// Group by region
const regions = {};
OPERATORS.forEach(op => {
  if (!regions[op.region]) regions[op.region] = [];
  regions[op.region].push(op);
});

const regionColors = {
  'Europe':'#475569','Russie':'#9f1239','Amériques':'#0369a1',
  'Asie':'#15803d','Océanie':'#854d0e','Afrique':'#92400e'
};

Object.entries(regions).forEach(([region, ops]) => {
  const regionDiv = document.createElement('div');
  regionDiv.style.cssText = 'font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:'+regionColors[region]+';padding:6px 0 2px 8px;';
  regionDiv.textContent = region;
  legendEl.appendChild(regionDiv);

  ops.forEach(op => {
    op.routes.sort((a,b) => routeDist(b.stops)-routeDist(a.stops));

    const sec = document.createElement('div');
    sec.className = 'op-section';

    const hdr = document.createElement('div');
    hdr.className = 'op-header';
    hdr.innerHTML = `
      <div class="op-dot" style="background:${op.color}"></div>
      <div class="op-name">${op.name}</div>
      <button class="op-toggle">Masquer</button>`;

    const list = document.createElement('div');
    list.className = 'routes-list';

    let visible = true;
    const polylines = [];

    op.routes.forEach(route => {
      const pts = route.stops.map(s => C[s]).filter(Boolean);
      if (pts.length < 2) return;
      const dist = routeDist(route.stops);

      const poly = L.polyline(pts,{
        color:op.color, weight:2, opacity:.65, smoothFactor:1.8
      }).addTo(map);

      const html = `
        <div class="popup-name">${route.name}</div>
        <div class="popup-badge" style="background:${op.color}22;color:${op.color};border:1px solid ${op.color}55">${op.name}</div>
        <div class="popup-grid">
          <div class="popup-label">Durée</div><div class="popup-value">${route.duration}</div>
          <div class="popup-label">Fréquence</div><div class="popup-value">${route.freq}</div>
          <div class="popup-label">Distance</div><div class="popup-value">~${dist.toLocaleString()} km</div>
        </div>
        <div class="popup-stops">${route.stops.join(' → ')}</div>`;

      poly.bindPopup(html,{ maxWidth:300 });
      poly.on('mouseover',function(){ this.setStyle({weight:5,opacity:1}); });
      poly.on('mouseout', function(){ this.setStyle({weight:2,opacity:.65}); });
      polylines.push(poly);

      const item = document.createElement('div');
      item.className = 'route-item';
      item.dataset.name = route.name.toLowerCase();
      item.innerHTML = `<span>${route.name}</span><span class="route-km">${dist.toLocaleString()} km</span>`;
      item.addEventListener('click',() => {
        map.fitBounds(poly.getBounds(),{padding:[60,60]});
        setTimeout(()=>poly.openPopup(),350);
      });
      list.appendChild(item);
      allItems.push({ item, sec });
    });

    const btn = hdr.querySelector('.op-toggle');
    btn.addEventListener('click', e => {
      e.stopPropagation();
      visible = !visible;
      polylines.forEach(p => visible ? p.addTo(map) : p.remove());
      btn.textContent = visible ? 'Masquer' : 'Afficher';
      list.style.opacity = visible ? '1' : '.35';
    });

    sec.appendChild(hdr); sec.appendChild(list);
    legendEl.appendChild(sec);
  });
});

// ── Endpoint markers ───────────────────────────────────────────
const endpoints = new Set();
OPERATORS.forEach(op => op.routes.forEach(r => {
  if(r.stops.length){ endpoints.add(r.stops[0]); endpoints.add(r.stops[r.stops.length-1]); }
}));
endpoints.forEach(name => {
  const coord = C[name]; if(!coord) return;
  L.circleMarker(coord,{
    radius:4, fillColor:'#f8fafc', color:'#0f172a', weight:1.5, fillOpacity:.9
  }).bindTooltip(name,{ permanent:false, direction:'top', className:'city-tip' }).addTo(map);
});

// ── Search ─────────────────────────────────────────────────────
function filterRoutes(q) {
  q = q.toLowerCase().trim();
  allItems.forEach(({item, sec}) => {
    const match = !q || item.dataset.name.includes(q);
    item.style.display = match ? '' : 'none';
  });
}
